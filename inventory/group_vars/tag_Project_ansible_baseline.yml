ansible_connection: amazon.aws.aws_ssm
ansible_aws_ssm_region: us-east-1
ansible_aws_ssm_bucket_name: terraform-ansible-baseline-ssm-dougops
ansible_aws_ssm_s3_addressing_style: virtual

baseline_packages:
  - curl
  - git
  - unzip
  - vim
  - ca-certificates
  - apt-transport-https
  - gnupg

admin_user: devops

docker_packages:
  - docker.io

docker_users:
  - devops

nginx_package: nginx
nginx_listen_port: 80
nginx_site_root: /var/www/html
nginx_demo_message: "Provisioned by Ansible on AWS"
nginx_demo_subtitle: "Terraform created the infrastructure. Ansible configured the host."
